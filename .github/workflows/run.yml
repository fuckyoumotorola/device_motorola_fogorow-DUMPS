name: Import fogorow dump

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source Git repo"
        required: true
        default: "https://www.gitgud.io/okbuddygsi-dumps/motorola/fogorow.git"
      target_branch:
        description: "Branch where files will be uploaded"
        required: true
        default: "main"

permissions:
  contents: write

concurrency:
  group: import-fogorow-dump
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest

    env:
      SOURCE_DIR: /tmp/fogorow-source
      GIT_PROGRESS_DELAY: 1
      GIT_TRACE_PERFORMANCE: 1
      GIT_LFS_SKIP_SMUDGE: 1

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
          lfs: false
          persist-credentials: true

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y git-lfs rsync

          git lfs install
          git config --global lfs.concurrenttransfers 16
          git config --global lfs.activitytimeout 120
          git config --global lfs.dialtimeout 120
          git config --global advice.detachedHead false

      - name: Download source repo with progress
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$SOURCE_DIR"

          echo "Cloning source repository..."
          git clone \
            --depth=1 \
            --single-branch \
            --progress \
            "${{ inputs.source_url }}" \
            "$SOURCE_DIR"

          cd "$SOURCE_DIR"

          if git lfs ls-files | grep -q .; then
            echo "Downloading Git LFS files from source..."
            git lfs pull --include="*" --exclude=""
          else
            echo "No Git LFS files detected in source."
          fi

          echo "Source size:"
          du -sh "$SOURCE_DIR"

          echo "Source file count:"
          find "$SOURCE_DIR" -type f | wc -l

          rm -rf "$SOURCE_DIR/.git"

      - name: Prepare Git LFS rules
        shell: bash
        run: |
          set -euo pipefail

          git lfs install --local

          git lfs track "*.img"
          git lfs track "*.bin"
          git lfs track "*.br"
          git lfs track "*.dat"
          git lfs track "*.new.dat"
          git lfs track "*.transfer.list"
          git lfs track "*.map"
          git lfs track "*.apk"
          git lfs track "*.apex"
          git lfs track "*.so"
          git lfs track "*.ko"
          git lfs track "*.zip"
          git lfs track "*.7z"
          git lfs track "*.tar"
          git lfs track "*.gz"
          git lfs track "*.xz"
          git lfs track "*.zst"

          echo "Tracking every file bigger than 95 MB individually..."
          cd "$SOURCE_DIR"

          while IFS= read -r -d '' file; do
            rel="${file#./}"
            echo "LFS: $rel"
            cd "$GITHUB_WORKSPACE"
            git lfs track --filename "$rel"
            cd "$SOURCE_DIR"
          done < <(find . -type f -size +95M -print0)

          cd "$GITHUB_WORKSPACE"

          echo "Current LFS rules:"
          cat .gitattributes || true

      - name: Copy files into target repo with progress
        shell: bash
        run: |
          set -euo pipefail

          echo "Copying files..."
          rsync -a --delete --human-readable --info=progress2,stats2 \
            --exclude ".git" \
            --exclude ".github/workflows/import-fogorow-dump.yml" \
            "$SOURCE_DIR/" \
            "$GITHUB_WORKSPACE/"

          echo "Target size:"
          du -sh "$GITHUB_WORKSPACE"

          echo "Target file count:"
          find "$GITHUB_WORKSPACE" -type f \
            -not -path "$GITHUB_WORKSPACE/.git/*" \
            | wc -l

      - name: Commit and push with LFS progress
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Adding files..."
          git add .gitattributes .
          
          if git diff --cached --quiet; then
            echo "No changes to upload."
            exit 0
          fi

          echo "Files staged:"
          git diff --cached --stat

          echo "Committing..."
          git commit -m "Import fogorow dump"

          echo "Uploading Git LFS objects..."
          git lfs push --all origin "HEAD"

          echo "Pushing branch..."
          git push --progress origin "HEAD:${{ inputs.target_branch }}"
