name: Import fogorow dump resumable

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Source Git repo"
        required: true
        default: "https://www.gitgud.io/okbuddygsi-dumps/motorola/fogorow.git"
      target_branch:
        description: "Branch where files will be uploaded"
        required: true
        default: "main"
      max_minutes:
        description: "Stop safely after this many minutes"
        required: true
        default: "170"

permissions:
  contents: write

concurrency:
  group: import-fogorow-dump
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SOURCE_DIR: /tmp/fogorow-source
      GIT_PROGRESS_DELAY: 1
      GIT_TRACE_PERFORMANCE: 1
      GIT_LFS_SKIP_SMUDGE: 1

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
          lfs: false
          persist-credentials: true

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y git-lfs rsync coreutils

          git lfs install
          git config --global lfs.concurrenttransfers 16
          git config --global lfs.activitytimeout 120
          git config --global lfs.dialtimeout 120
          git config --global advice.detachedHead false

      - name: Prepare target Git LFS
        shell: bash
        run: |
          set -euo pipefail

          git lfs install --local

          git lfs track "*.img"
          git lfs track "*.bin"
          git lfs track "*.br"
          git lfs track "*.dat"
          git lfs track "*.new.dat"
          git lfs track "*.transfer.list"
          git lfs track "*.map"
          git lfs track "*.apk"
          git lfs track "*.apex"
          git lfs track "*.so"
          git lfs track "*.ko"
          git lfs track "*.zip"
          git lfs track "*.7z"
          git lfs track "*.tar"
          git lfs track "*.gz"
          git lfs track "*.xz"
          git lfs track "*.zst"

          git add .gitattributes

          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Prepare Git LFS rules"
            git push --progress origin "HEAD:${{ inputs.target_branch }}"
          fi

      - name: Clone source metadata only
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "$SOURCE_DIR"

          git clone \
            --depth=1 \
            --single-branch \
            --filter=blob:none \
            --no-checkout \
            --progress \
            "${{ inputs.source_url }}" \
            "$SOURCE_DIR"

          cd "$SOURCE_DIR"

          git lfs install --local
          git lfs env

          git ls-tree -r --name-only HEAD > /tmp/source-files.txt

          echo "Source files:"
          wc -l /tmp/source-files.txt

      - name: Import files in resumable batches
        shell: bash
        run: |
          set -euo pipefail

          START_TIME="$(date +%s)"
          MAX_SECONDS="$(( ${{ inputs.max_minutes }} * 60 ))"
          SAFETY_SECONDS=300
          BATCH_FILE_LIMIT=200
          BATCH_BYTE_LIMIT="$(( 750 * 1024 * 1024 ))"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          should_stop() {
            now="$(date +%s)"
            elapsed="$(( now - START_TIME ))"
            remaining="$(( MAX_SECONDS - elapsed ))"

            if [ "$remaining" -le "$SAFETY_SECONDS" ]; then
              return 0
            fi

            return 1
          }

          push_batch() {
            if git diff --cached --quiet; then
              return 0
            fi

            echo "Committing current batch..."
            git diff --cached --stat || true

            git commit -m "Import fogorow dump batch"

            echo "Uploading Git LFS objects..."
            git lfs push origin HEAD

            echo "Pushing branch progress..."
            git push --progress origin "HEAD:${{ inputs.target_branch }}"
          }

          is_lfs_pointer_file() {
            git lfs pointer --check --file "$1" >/dev/null 2>&1
          }

          lfs_oid_from_pointer() {
            sed -n 's/^oid sha256://p' "$1" | head -n 1
          }

          lfs_size_from_pointer() {
            sed -n 's/^size //p' "$1" | head -n 1
          }

          target_already_has_lfs_oid() {
            rel="$1"
            oid="$2"

            cd "$GITHUB_WORKSPACE"

            if ! git cat-file -e "HEAD:$rel" 2>/dev/null; then
              return 1
            fi

            tmp_target_pointer="$(mktemp)"
            git cat-file blob "HEAD:$rel" > "$tmp_target_pointer" || true

            if is_lfs_pointer_file "$tmp_target_pointer"; then
              target_oid="$(lfs_oid_from_pointer "$tmp_target_pointer")"
              rm -f "$tmp_target_pointer"

              if [ "$target_oid" = "$oid" ]; then
                return 0
              fi
            else
              rm -f "$tmp_target_pointer"
            fi

            return 1
          }

          copy_source_file() {
            rel="$1"
            tmp_blob="$(mktemp)"

            cd "$SOURCE_DIR"

            git cat-file blob "HEAD:$rel" > "$tmp_blob"

            mkdir -p "$GITHUB_WORKSPACE/$(dirname "$rel")"

            if is_lfs_pointer_file "$tmp_blob"; then
              oid="$(lfs_oid_from_pointer "$tmp_blob")"
              size="$(lfs_size_from_pointer "$tmp_blob")"

              echo "LFS object detected: $rel"
              echo "LFS oid: $oid"
              echo "LFS size: $size bytes"

              if target_already_has_lfs_oid "$rel" "$oid"; then
                echo "Already imported LFS object: $rel"
                rm -f "$tmp_blob"
                return 2
              fi

              cd "$SOURCE_DIR"

              git lfs fetch origin --include="$rel" --exclude=""

              GIT_LFS_SKIP_SMUDGE=0 git lfs smudge < "$tmp_blob" > "$GITHUB_WORKSPACE/$rel"

              actual_oid="$(sha256sum "$GITHUB_WORKSPACE/$rel" | awk '{print $1}')"

              if [ "$actual_oid" != "$oid" ]; then
                echo "Downloaded LFS object checksum mismatch for $rel"
                echo "Expected: $oid"
                echo "Actual:   $actual_oid"
                exit 1
              fi

              rm -f "$tmp_blob"
              echo "$size"
              return 0
            fi

            cp "$tmp_blob" "$GITHUB_WORKSPACE/$rel"
            size="$(wc -c < "$GITHUB_WORKSPACE/$rel")"
            rm -f "$tmp_blob"
            echo "$size"
            return 0
          }

          cd "$SOURCE_DIR"

          TOTAL_FILES="$(wc -l < /tmp/source-files.txt)"
          DONE_FILES=0
          COPIED_IN_BATCH=0
          BYTES_IN_BATCH=0

          while IFS= read -r rel; do
            DONE_FILES="$(( DONE_FILES + 1 ))"

            case "$rel" in
              .git/*|.github/workflows/import-fogorow-dump.yml)
                echo "Skipping protected file: $rel"
                continue
                ;;
            esac

            if should_stop; then
              echo "Time limit is near. Saving current progress before stopping..."
              cd "$GITHUB_WORKSPACE"
              push_batch
              echo "Stopped safely. Run the workflow again to continue."
              exit 0
            fi

            echo "[$DONE_FILES/$TOTAL_FILES] Importing: $rel"

            set +e
            imported_size="$(copy_source_file "$rel")"
            copy_status="$?"
            set -e

            if [ "$copy_status" = "2" ]; then
              cd "$SOURCE_DIR"
              continue
            fi

            if [ "$copy_status" != "0" ]; then
              echo "Failed importing: $rel"
              exit "$copy_status"
            fi

            cd "$GITHUB_WORKSPACE"

            git add .gitattributes "$rel"

            if git diff --cached --quiet; then
              echo "No changes after add: $rel"
              cd "$SOURCE_DIR"
              continue
            fi

            COPIED_IN_BATCH="$(( COPIED_IN_BATCH + 1 ))"
            BYTES_IN_BATCH="$(( BYTES_IN_BATCH + imported_size ))"

            echo "Imported size this batch: $(( BYTES_IN_BATCH / 1024 / 1024 )) MiB"
            echo "Files this batch: $COPIED_IN_BATCH"

            if [ "$COPIED_IN_BATCH" -ge "$BATCH_FILE_LIMIT" ] || [ "$BYTES_IN_BATCH" -ge "$BATCH_BYTE_LIMIT" ]; then
              push_batch
              COPIED_IN_BATCH=0
              BYTES_IN_BATCH=0
            fi

            cd "$SOURCE_DIR"
          done < /tmp/source-files.txt

          cd "$GITHUB_WORKSPACE"

          echo "Pushing final batch..."
          push_batch

          echo "Import finished."
